<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Barcode Generator</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 40px 20px;
        }
        .error-code {
            font-size: clamp(80px, 15vw, 160px);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 12px;
        }
        .error-title {
            font-size: clamp(20px, 4vw, 32px);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        .error-desc {
            font-size: 16px;
            color: var(--text-muted);
            max-width: 500px;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .error-links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .error-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .error-link-primary {
            background: var(--primary);
            color: white;
        }
        .error-link-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.3);
        }
        .error-link-secondary {
            background: var(--surface);
            color: var(--text-secondary);
            border: 1.5px solid var(--border);
        }
        .error-link-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .error-barcode {
            margin-top: 48px;
            opacity: 0.15;
        }
        .lang-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 32px;
        }
        .lang-row a {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .lang-row a:hover {
            background: var(--primary-light);
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="error-page">
            <div class="error-code">404</div>
            <div class="error-title" id="e-title">Page not found</div>
            <div class="error-desc" id="e-desc">The page you're looking for doesn't exist or has been moved. Try going back to the homepage.</div>

            <div class="error-links">
                <a href="/" class="error-link error-link-primary">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2.5 7L9 2l6.5 5v8.5a1 1 0 01-1 1h-4v-4.5H7.5V16.5h-4a1 1 0 01-1-1V7z"/></svg>
                    Homepage
                </a>
                <a href="/en/" class="error-link error-link-secondary">🇬🇧 English</a>
            </div>

            <div class="lang-row">
                <a href="/">🇵🇱 Polski</a>
                <a href="/en/">🇬🇧 English</a>
                <a href="/de/">🇩🇪 Deutsch</a>
                <a href="/fr/">🇫🇷 Français</a>
                <a href="/es/">🇪🇸 Español</a>
                <a href="/it/">🇮🇹 Italiano</a>
                <a href="/pt/">🇵🇹 Português</a>
                <a href="/nl/">🇳🇱 Nederlands</a>
                <a href="/cs/">🇨🇿 Čeština</a>
                <a href="/uk/">🇺🇦 Українська</a>
            </div>

            <!-- Decorative barcode -->
            <div class="error-barcode">
                <svg width="200" height="60" viewBox="0 0 200 60" fill="none">
                    <rect x="10" y="5" width="4" height="50" rx="1" fill="currentColor"/>
                    <rect x="20" y="10" width="2" height="40" rx="0.5" fill="currentColor"/>
                    <rect x="28" y="3" width="5" height="54" rx="1" fill="currentColor"/>
                    <rect x="40" y="8" width="3" height="44" rx="0.5" fill="currentColor"/>
                    <rect x="50" y="5" width="4" height="50" rx="1" fill="currentColor"/>
                    <rect x="60" y="12" width="2" height="36" rx="0.5" fill="currentColor"/>
                    <rect x="68" y="2" width="5" height="56" rx="1" fill="currentColor"/>
                    <rect x="80" y="8" width="3" height="44" rx="0.5" fill="currentColor"/>
                    <rect x="90" y="5" width="4" height="50" rx="1" fill="currentColor"/>
                    <rect x="100" y="10" width="2" height="40" rx="0.5" fill="currentColor"/>
                    <rect x="108" y="3" width="5" height="54" rx="1" fill="currentColor"/>
                    <rect x="120" y="8" width="3" height="44" rx="0.5" fill="currentColor"/>
                    <rect x="130" y="5" width="4" height="50" rx="1" fill="currentColor"/>
                    <rect x="140" y="12" width="2" height="36" rx="0.5" fill="currentColor"/>
                    <rect x="148" y="2" width="5" height="56" rx="1" fill="currentColor"/>
                    <rect x="160" y="8" width="3" height="44" rx="0.5" fill="currentColor"/>
                    <rect x="170" y="5" width="4" height="50" rx="1" fill="currentColor"/>
                    <rect x="180" y="10" width="2" height="40" rx="0.5" fill="currentColor"/>
                    <rect x="188" y="3" width="5" height="54" rx="1" fill="currentColor"/>
                </svg>
            </div>
        </div>
    </div>

    <script>
        // Auto-detect language and adjust text
        const lang = (navigator.language || '').slice(0, 2);
        const t = {
            pl: { title: 'Strona nie znaleziona', desc: 'Strona, której szukasz, nie istnieje lub została przeniesiona. Spróbuj wrócić na stronę główną.' },
            de: { title: 'Seite nicht gefunden', desc: 'Die gesuchte Seite existiert nicht oder wurde verschoben. Versuchen Sie, zur Startseite zurückzukehren.' },
            fr: { title: 'Page introuvable', desc: 'La page que vous recherchez n\u2019existe pas ou a été déplacée. Essayez de revenir à la page d\u2019accueil.' },
            es: { title: 'Página no encontrada', desc: 'La página que buscas no existe o ha sido movida. Intenta volver a la página principal.' },
            it: { title: 'Pagina non trovata', desc: 'La pagina che stai cercando non esiste o è stata spostata. Prova a tornare alla homepage.' },
            pt: { title: 'Página não encontrada', desc: 'A página que procura não existe ou foi movida. Tente voltar à página inicial.' },
            nl: { title: 'Pagina niet gevonden', desc: 'De pagina die u zoekt bestaat niet of is verplaatst. Probeer terug te gaan naar de homepage.' },
            cs: { title: 'Stránka nenalezena', desc: 'Stránka, kterou hledáte, neexistuje nebo byla přesunuta. Zkuste se vrátit na hlavní stránku.' },
            uk: { title: 'Сторінку не знайдено', desc: 'Сторінка, яку ви шукаєте, не існує або була переміщена. Спробуйте повернутися на головну.' },
        };
        if (t[lang]) {
            document.getElementById('e-title').textContent = t[lang].title;
            document.getElementById('e-desc').textContent = t[lang].desc;
        }

        // Dark mode support
        const saved = localStorage.getItem('barcode-theme') ||
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', saved);
    </script>
</body>
</html>
