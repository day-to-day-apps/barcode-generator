<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print builder — Barcode Generator</title>
    <meta name="description" content="Compose multi-barcode print sheets from saved templates, printer profiles, manual rows, and CSV imports.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://barcode-generator.daytodayapps.com/wydruk.html">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css?v=20260521120000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="i18n.js?v=20260613130000"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js" defer></script>
    <script src="label-renderer.js?v=20260613130000" defer></script>
</head>
<body data-page="wydruk">
    <div class="app">
        <header class="animated-header">
            <div class="logo">
                <h1 data-i18n="builderTitle">Print builder</h1>
                <p class="subtitle" data-i18n="subtitleBuilder">Compose batch print sheets from templates, printers, and item lists.</p>
            </div>
            <nav class="app-nav" aria-label="Primary" data-signed-in="false">
                <a href="./" data-i18n="backToGenerator">&larr; Generator</a>
                <a href="moje-kody.html" data-i18n="myCodes">My codes</a>
                <a href="szablony.html" data-i18n="myTemplates">My templates</a>
                <a href="drukarki.html" data-i18n="myPrinters">My printers</a>
                <a href="historia-wydrukow.html" data-i18n="printHistory">Print history</a>
                <a href="konto.html" data-i18n="title">Account</a>
            </nav>
        </header>

        <main id="main-content" class="container">
            <section class="card" aria-labelledby="builder-title">
                <h2 id="builder-title" data-i18n="builderTitle">Print builder</h2>
                <div id="status" role="status" aria-live="polite" data-i18n="loading">Loading…</div>

                <div id="builder-panel" hidden>
                    <form id="builder-form" class="template-form" autocomplete="off">
                        <div class="form-row">
                            <label for="b-name" data-i18n="jobName">Job name</label>
                            <input type="text" id="b-name" maxlength="120" required>
                        </div>
                        <div class="form-row form-row-2">
                            <div>
                                <label for="b-template" data-i18n="useTemplate">Template</label>
                                <select id="b-template">
                                    <option value="" data-i18n="optional">— optional —</option>
                                </select>
                            </div>
                            <div>
                                <label for="b-printer" data-i18n="usePrinter">Printer profile</label>
                                <select id="b-printer" required>
                                    <option value="" data-i18n="selectPrinter">Select a printer profile</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <label for="b-notes" data-i18n="jobNotes">Notes (optional)</label>
                            <textarea id="b-notes" maxlength="2000" rows="2"></textarea>
                        </div>
                    </form>

                    <section class="form-fieldset" aria-labelledby="items-heading">
                        <h3 id="items-heading" data-i18n="items">Items</h3>
                        <div class="codes-toolbar templates-toolbar">
                            <div class="codes-toolbar-left">
                                <span id="items-counter" class="codes-counter"></span>
                            </div>
                            <div class="codes-toolbar-right">
                                <button type="button" id="btn-add-row" class="btn-secondary" data-i18n="addRow">Add row</button>
                                <label for="csv-file" class="btn-secondary" style="cursor:pointer;" data-i18n="importCsv">Import CSV</label>
                                <input type="file" id="csv-file" accept=".csv,text/csv" hidden>
                                <button type="button" id="btn-clear" class="btn-link" data-i18n="clearAll">Clear all</button>
                            </div>
                        </div>
                        <div id="csv-status" class="form-error" hidden></div>

                        <div class="table-scroll">
                            <table class="items-table" id="items-table">
                                <thead>
                                    <tr>
                                        <th data-i18n="colValue">Value</th>
                                        <th data-i18n="colCodeType">Type</th>
                                        <th data-i18n="colName">Name</th>
                                        <th data-i18n="colPrice">Price</th>
                                        <th data-i18n="colCopies">Copies</th>
                                        <th aria-label="actions"></th>
                                    </tr>
                                </thead>
                                <tbody id="items-tbody"></tbody>
                            </table>
                        </div>

                        <template id="item-row-template">
                            <tr class="item-row">
                                <td><input type="text" class="i-value" maxlength="4096" required></td>
                                <td>
                                    <select class="i-type">
                                        <option>CODE128</option>
                                        <option>EAN13</option>
                                        <option>EAN8</option>
                                        <option>UPC</option>
                                        <option>CODE39</option>
                                        <option>ITF14</option>
                                    </select>
                                </td>
                                <td><input type="text" class="i-name" maxlength="200"></td>
                                <td><input type="text" class="i-price" maxlength="64"></td>
                                <td><input type="number" class="i-copies" min="1" max="1000" step="1" value="1"></td>
                                <td><button type="button" class="btn-action btn-row-delete" data-i18n="delete">Delete</button></td>
                            </tr>
                        </template>
                    </section>

                    <div id="builder-error" class="form-error" hidden></div>

                    <div class="form-actions">
                        <button type="button" id="btn-preview" class="btn-secondary" data-i18n="preview">Preview</button>
                        <button type="button" id="btn-print" class="btn-primary" data-i18n="printNow">Print now</button>
                        <button type="button" id="btn-save" class="btn-secondary" data-i18n="saveJob">Save job</button>
                    </div>

                    <section id="preview-area" class="preview-area" aria-live="polite" hidden></section>
                </div>

                <div id="signed-out" class="empty-state" hidden>
                    <p data-i18n="signedOutMsg">Sign in to use the print builder.</p>
                    <a class="btn-primary" href="konto.html" data-i18n="goToAccount">Go to account</a>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Barcode Generator. <a href="polityka-prywatnosci.html">Privacy</a></p>
        </footer>
    </div>

    <script src="analytics.js" defer></script>
    <script type="module">
        import { getSession, onAuthStateChange } from './supabase-client.js';
        import { listTemplates } from './db-templates.js';
        import { listPrinters } from './db-printers.js';
        import { savePrintJob, countJobs, getJobById, FREE_JOBS_LIMIT, normaliseJobItem } from './db-jobs.js';
        import { parseCsvFile, rowsToJobItems, MAX_ROWS } from './csv-import.js';
        import { buildSheetHTML, openPrintWindow, MAX_LABELS } from './print-builder.js';

        const LANG = document.documentElement.lang || 'en';
        const I = window.BARCODE_I18N || {};
        const T = (I[LANG] && I[LANG].account) || (I.en && I.en.account) || {};

        function translate(root = document) {
            root.querySelectorAll('[data-i18n]').forEach((el) => {
                const key = el.getAttribute('data-i18n');
                if (T[key]) el.textContent = T[key];
            });
        }
        translate();

        const $ = (id) => document.getElementById(id);
        const els = {
            status: $('status'),
            panel: $('builder-panel'),
            signedOut: $('signed-out'),
            form: $('builder-form'),
            name: $('b-name'),
            template: $('b-template'),
            printer: $('b-printer'),
            notes: $('b-notes'),
            tbody: $('items-tbody'),
            rowTpl: $('item-row-template'),
            counter: $('items-counter'),
            btnAdd: $('btn-add-row'),
            btnClear: $('btn-clear'),
            csvInput: $('csv-file'),
            csvStatus: $('csv-status'),
            btnPreview: $('btn-preview'),
            btnPrint: $('btn-print'),
            btnSave: $('btn-save'),
            error: $('builder-error'),
            preview: $('preview-area'),
        };

        let templates = [];
        let printers = [];

        function setStatus(key, hide) {
            if (!els.status) return;
            if (hide) { els.status.hidden = true; els.status.textContent = ''; return; }
            els.status.hidden = false;
            els.status.textContent = T[key] || key;
        }
        function showError(key) {
            if (!els.error) return;
            els.error.hidden = false;
            els.error.textContent = T[key] || key;
        }
        function clearError() { if (els.error) { els.error.hidden = true; els.error.textContent = ''; } }

        function updateCounter() {
            const rows = els.tbody.querySelectorAll('tr.item-row').length;
            if (!els.counter) return;
            const tpl = T.itemsCount || '{n} items';
            els.counter.textContent = tpl.replace('{n}', String(rows));
        }

        function addRow(data) {
            if (els.tbody.querySelectorAll('tr.item-row').length >= MAX_ROWS) return false;
            const frag = els.rowTpl.content.cloneNode(true);
            const tr = frag.querySelector('tr');
            if (data) {
                tr.querySelector('.i-value').value = data.value || '';
                tr.querySelector('.i-type').value = data.code_type || 'CODE128';
                tr.querySelector('.i-name').value = data.name || '';
                tr.querySelector('.i-price').value = data.price || '';
                tr.querySelector('.i-copies').value = Number(data.copies) || 1;
            }
            tr.querySelector('.btn-row-delete').addEventListener('click', () => {
                tr.remove();
                updateCounter();
            });
            translate(tr);
            els.tbody.appendChild(tr);
            updateCounter();
            return true;
        }

        function collectItems() {
            const rows = Array.from(els.tbody.querySelectorAll('tr.item-row'));
            const items = [];
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                const value = row.querySelector('.i-value').value.trim();
                if (!value) continue;
                items.push(normaliseJobItem({
                    value,
                    code_type: row.querySelector('.i-type').value,
                    name: row.querySelector('.i-name').value.trim(),
                    price: row.querySelector('.i-price').value.trim(),
                    copies: row.querySelector('.i-copies').value,
                }, items.length));
            }
            return items;
        }

        function selectedTemplateConfig() {
            const id = els.template.value;
            if (!id) return null;
            const row = templates.find((t) => t.id === id);
            return row ? row.config : null;
        }
        function selectedPrinterProfile() {
            const id = els.printer.value;
            if (!id) return null;
            return printers.find((p) => p.id === id) || null;
        }

        function buildSheet() {
            const items = collectItems();
            if (items.length === 0) { showError('jobItemsRequired'); return null; }
            const printer = selectedPrinterProfile();
            if (!printer) { showError('selectPrinter'); return null; }
            clearError();
            try {
                return buildSheetHTML({
                    items,
                    template: selectedTemplateConfig(),
                    printer,
                    t: T,
                    title: els.name.value || 'Print',
                });
            } catch (err) {
                showError('previewFailed');
                console.error(err);
                return null;
            }
        }

        els.btnAdd.addEventListener('click', () => addRow());
        els.btnClear.addEventListener('click', () => {
            if (!confirm(T.clearAllConfirm || 'Clear all rows?')) return;
            els.tbody.innerHTML = '';
            updateCounter();
        });

        els.csvInput.addEventListener('change', async () => {
            const file = els.csvInput.files && els.csvInput.files[0];
            if (!file) return;
            els.csvStatus.hidden = true;
            try {
                const parsed = await parseCsvFile(file);
                const { items, skipped } = rowsToJobItems(parsed.rows, { header: true });
                let added = 0;
                for (const it of items) { if (addRow(it)) added++; else break; }
                const tpl = T.csvImported || 'Imported {n} rows ({skipped} skipped).';
                els.csvStatus.hidden = false;
                els.csvStatus.textContent = tpl.replace('{n}', String(added)).replace('{skipped}', String(skipped));
            } catch (err) {
                els.csvStatus.hidden = false;
                els.csvStatus.textContent = T.csvFailed || ('CSV import failed: ' + (err && err.message || err));
            } finally {
                els.csvInput.value = '';
            }
        });

        els.btnPreview.addEventListener('click', () => {
            const result = buildSheet();
            if (!result) return;
            els.preview.hidden = false;
            const iframe = document.createElement('iframe');
            iframe.title = 'Print preview';
            iframe.style.cssText = 'width:100%;height:600px;border:1px solid var(--border-color,#d1d5db);background:#fff;';
            iframe.srcdoc = result.html;
            els.preview.innerHTML = '';
            const summary = document.createElement('p');
            summary.textContent = (T.previewSummary || '{pages} pages, {labels} labels')
                .replace('{pages}', String(result.pages))
                .replace('{labels}', String(result.labelsTotal));
            els.preview.appendChild(summary);
            els.preview.appendChild(iframe);
        });

        els.btnPrint.addEventListener('click', () => {
            const result = buildSheet();
            if (!result) return;
            const win = openPrintWindow(result.html);
            if (!win) showError('popupBlocked');
        });

        els.btnSave.addEventListener('click', async () => {
            clearError();
            const name = els.name.value.trim();
            if (!name) { showError('jobNameRequired'); return; }
            const items = collectItems();
            if (items.length === 0) { showError('jobItemsRequired'); return; }

            const { count } = await countJobs();
            if ((count ?? 0) >= FREE_JOBS_LIMIT) { showError('freeJobsLimitReached'); return; }

            const payload = {
                name,
                template_id: els.template.value || null,
                printer_profile_id: els.printer.value || null,
                notes: els.notes.value.trim() || null,
            };
            els.btnSave.disabled = true;
            try {
                const { data, error } = await savePrintJob(payload, items);
                if (error) { showError('jobSaveFail'); window.trackBarcode?.('print_error', { stage: 'save_job', message: error.message }); console.error(error); return; }
                els.btnSave.textContent = T.jobSaved || 'Saved';
                setTimeout(() => { els.btnSave.textContent = T.saveJob || 'Save job'; }, 1500);
                console.info('Saved job', data);
                window.trackBarcode?.('print_job_saved', { items: items.length });
            } finally {
                els.btnSave.disabled = false;
            }
        });

        async function populateSelectors() {
            const [tpl, prn] = await Promise.all([listTemplates(), listPrinters()]);
            templates = tpl.data || [];
            printers = prn.data || [];
            for (const t of templates) {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = t.name + (t.is_default ? ' ★' : '');
                els.template.appendChild(opt);
            }
            for (const p of printers) {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = p.name + (p.is_default ? ' ★' : '');
                if (p.is_default) opt.selected = true;
                els.printer.appendChild(opt);
            }
        }

        async function bootstrap() {
            const session = await getSession();
            if (!session) {
                setStatus('loading', true);
                els.signedOut.hidden = false;
                return;
            }
            try {
                await populateSelectors();
                const prefillId = new URLSearchParams(location.search).get('id');
                let prefilled = false;
                if (prefillId) {
                    const { data: job, error: jobErr } = await getJobById(prefillId);
                    if (jobErr) console.error(jobErr);
                    if (job) {
                        els.name.value = job.name || '';
                        if (job.template_id) els.template.value = job.template_id;
                        if (job.printer_profile_id) els.printer.value = job.printer_profile_id;
                        els.notes.value = job.notes || '';
                        for (const it of (job.items || [])) {
                            if (!addRow(it)) break;
                        }
                        prefilled = (job.items || []).length > 0;
                    }
                }
                if (!prefilled) addRow();
                setStatus('loading', true);
                els.panel.hidden = false;
            } catch (err) {
                console.error(err);
                showError('builderLoadFail');
                setStatus('loading', true);
            }
        }

        onAuthStateChange((event) => {
            if (event === 'SIGNED_OUT') location.reload();
        });

        bootstrap();
    </script>
    <script type="module" src="nav-enhance.js?v=20260613130000"></script>
</body>
</html>
