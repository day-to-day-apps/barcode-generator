<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account — Barcode Generator</title>
    <meta name="description" content="Sign in to Barcode Generator with email and password to save and revisit your codes.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://barcode-generator.daytodayapps-contact.workers.dev/konto.html">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css?v=20260612000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="i18n.js?v=20260612000000"></script>
</head>
<body>
    <div class="app">
        <header class="animated-header">
            <div class="logo">
                <h1 data-i18n="title">Account</h1>
                <p class="subtitle" data-i18n="subtitleEmailPassword">Sign in with email and password to save your barcodes.</p>
            </div>
            <nav aria-label="Primary">
                <a href="./" data-i18n="backToGenerator">&larr; Back to generator</a>
                <a href="moje-kody.html" data-i18n="myCodes">My codes</a>
                <a href="szablony.html" data-i18n="myTemplates">My templates</a>
                <a href="drukarki.html" data-i18n="myPrinters">My printers</a>
                <a href="wydruk.html" data-i18n="builderTitle">Print builder</a>
                <a href="historia-wydrukow.html" data-i18n="printHistory">Print history</a>
            </nav>
        </header>

        <main id="main-content" class="container">
            <section class="card" aria-labelledby="account-title">
                <h2 id="account-title" data-i18n="signIn">Sign in</h2>

                <div id="signed-out" hidden>
                    <div class="auth-tabs" role="tablist" aria-label="Account actions">
                        <button type="button" role="tab" id="tab-login" aria-controls="panel-login" aria-selected="true" class="auth-tab is-active" data-tab="login" data-i18n="tabLogin">Sign in</button>
                        <button type="button" role="tab" id="tab-register" aria-controls="panel-register" aria-selected="false" class="auth-tab" data-tab="register" data-i18n="tabRegister">Create account</button>
                        <button type="button" role="tab" id="tab-reset" aria-controls="panel-reset" aria-selected="false" class="auth-tab" data-tab="reset" data-i18n="tabReset">Forgot password</button>
                    </div>

                    <div id="panel-login" role="tabpanel" aria-labelledby="tab-login">
                        <form id="login-form" novalidate>
                            <label for="login-email" data-i18n="email">Email address</label>
                            <input id="login-email" name="email" type="email" autocomplete="email" inputmode="email" required data-i18n-placeholder="emailPlaceholder" placeholder="you@example.com">
                            <label for="login-password" data-i18n="password">Password</label>
                            <input id="login-password" name="password" type="password" autocomplete="current-password" required minlength="8" data-i18n-placeholder="passwordPlaceholder" placeholder="At least 8 characters">
                            <button type="submit" id="login-submit" class="btn-primary" data-i18n="signInCta">Sign in</button>
                        </form>
                    </div>

                    <div id="panel-register" role="tabpanel" aria-labelledby="tab-register" hidden>
                        <form id="register-form" novalidate>
                            <label for="register-email" data-i18n="email">Email address</label>
                            <input id="register-email" name="email" type="email" autocomplete="email" inputmode="email" required data-i18n-placeholder="emailPlaceholder" placeholder="you@example.com">
                            <label for="register-password" data-i18n="password">Password</label>
                            <input id="register-password" name="password" type="password" autocomplete="new-password" required minlength="8" data-i18n-placeholder="passwordPlaceholder" placeholder="At least 8 characters">
                            <label for="register-password-confirm" data-i18n="confirmPassword">Confirm password</label>
                            <input id="register-password-confirm" name="password-confirm" type="password" autocomplete="new-password" required minlength="8">
                            <label class="checkbox-row">
                                <input id="register-terms" name="terms" type="checkbox" required>
                                <span data-i18n="acceptTerms">I agree to the privacy policy.</span>
                            </label>
                            <button type="submit" id="register-submit" class="btn-primary" data-i18n="registerCta">Create account</button>
                        </form>
                    </div>

                    <div id="panel-reset" role="tabpanel" aria-labelledby="tab-reset" hidden>
                        <form id="reset-form" novalidate>
                            <label for="reset-email" data-i18n="email">Email address</label>
                            <input id="reset-email" name="email" type="email" autocomplete="email" inputmode="email" required data-i18n-placeholder="emailPlaceholder" placeholder="you@example.com">
                            <button type="submit" id="reset-submit" class="btn-primary" data-i18n="resetCta">Send reset link</button>
                        </form>
                    </div>
                </div>

                <div id="signed-in" hidden>
                    <p><span data-i18n="signedInAs">Signed in as</span> <strong id="user-email"></strong>.</p>
                    <p>
                        <a class="btn-primary" href="moje-kody.html" data-i18n="mySavedCodes">My saved codes</a>
                        <button type="button" id="signout-btn" class="btn-action" data-i18n="signOut">Sign out</button>
                    </p>
                </div>

                <div id="email-status" role="status" aria-live="polite"></div>
                <noscript>This page requires JavaScript to sign in.</noscript>
            </section>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Barcode Generator. <a href="polityka-prywatnosci.html">Privacy</a></p>
        </footer>
    </div>

    <script type="module">
        import { getSupabase, getSession, onAuthStateChange } from './supabase-client.js';
        import {
            signUp,
            signIn,
            requestPasswordReset,
            signOut,
            validateEmail,
            validatePassword,
        } from './auth-email-password.js';

        const LANG = document.documentElement.lang || 'en';
        const I = window.BARCODE_I18N || {};
        const T = (I[LANG] && I[LANG].account) || (I.en && I.en.account) || {};

        document.querySelectorAll('[data-i18n]').forEach((el) => {
            const key = el.getAttribute('data-i18n');
            if (T[key]) el.textContent = T[key];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach((el) => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (T[key]) el.setAttribute('placeholder', T[key]);
        });
        if (T.title) document.title = `${T.title} — Barcode Generator`;

        const $ = (id) => document.getElementById(id);
        const status = $('email-status');
        const setStatus = (msg, isError = false) => {
            status.textContent = '';
            status.className = isError ? 'form-error' : 'form-success';
            requestAnimationFrame(() => { status.textContent = msg; });
        };

        function renderSession(session) {
            const signedIn = !!session?.user;
            $('signed-in').hidden = !signedIn;
            $('signed-out').hidden = signedIn;
            if (signedIn) $('user-email').textContent = session.user.email ?? '';
        }

        function switchTab(name) {
            ['login', 'register', 'reset'].forEach((n) => {
                const tab = document.getElementById(`tab-${n}`);
                const panel = document.getElementById(`panel-${n}`);
                const active = n === name;
                tab.setAttribute('aria-selected', String(active));
                tab.classList.toggle('is-active', active);
                panel.hidden = !active;
            });
            setStatus('');
        }

        async function init() {
            const sb = await getSupabase();
            if (!sb) {
                setStatus(T.notConfigured || 'Account features are not configured.', true);
                $('signed-out').hidden = false;
                return;
            }

            renderSession(await getSession());
            await onAuthStateChange((_event, session) => renderSession(session));

            document.querySelectorAll('.auth-tab').forEach((btn) => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });

            $('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = $('login-email').value;
                const password = $('login-password').value;
                if (!validateEmail(email)) return setStatus(T.invalidEmail || 'Please enter a valid email address.', true);
                if (!validatePassword(password)) return setStatus(T.weakPassword || 'Password must be at least 8 characters.', true);
                $('login-submit').disabled = true;
                setStatus(T.sending || 'Signing in…');
                const { error } = await signIn({ email, password });
                $('login-submit').disabled = false;
                if (error) return setStatus(error.message || T.signInFail || 'Could not sign in.', true);
                setStatus('');
            });

            $('register-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = $('register-email').value;
                const password = $('register-password').value;
                const confirm = $('register-password-confirm').value;
                const terms = $('register-terms').checked;
                if (!validateEmail(email)) return setStatus(T.invalidEmail || 'Please enter a valid email address.', true);
                if (!validatePassword(password)) return setStatus(T.weakPassword || 'Password must be at least 8 characters.', true);
                if (password !== confirm) return setStatus(T.passwordMismatch || 'Passwords do not match.', true);
                if (!terms) return setStatus(T.mustAcceptTerms || 'You must accept the privacy policy.', true);
                $('register-submit').disabled = true;
                setStatus(T.sending || 'Creating account…');
                const redirectPath = LANG === 'en' ? '/konto.html' : `/${LANG}/konto.html`;
                const { error } = await signUp({ email, password, redirectPath });
                $('register-submit').disabled = false;
                if (error) return setStatus(error.message || T.registerFail || 'Could not create the account.', true);
                setStatus(T.registerCheckInbox || 'Account created. Check your inbox to confirm your email.');
            });

            $('reset-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = $('reset-email').value;
                if (!validateEmail(email)) return setStatus(T.invalidEmail || 'Please enter a valid email address.', true);
                $('reset-submit').disabled = true;
                setStatus(T.sending || 'Sending…');
                const redirectPath = LANG === 'en' ? '/reset-hasla.html' : `/${LANG}/reset-hasla.html`;
                const { error } = await requestPasswordReset({ email, redirectPath });
                $('reset-submit').disabled = false;
                if (error) return setStatus(error.message || T.resetFail || 'Could not send reset email.', true);
                setStatus(T.resetSent || 'Check your inbox — we sent a password reset link.');
            });

            $('signout-btn').addEventListener('click', async () => {
                await signOut();
                setStatus(T.signedOut || 'Signed out.');
            });
        }

        init();
    </script>
</body>
</html>
