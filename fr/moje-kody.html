<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My codes — Barcode Generator</title>
    <meta name="description" content="Browse, regenerate and delete the barcodes you've saved.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://barcode-generator.daytodayapps.com/fr/moje-kody.html">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="stylesheet" href="../styles.css?v=20260519120000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="../i18n.js?v=20260519120000"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"
            integrity="sha384-Kk5SjBOKprEnGfyBWfD2zROFd1Cu8kwOXxG2GIhYPcoDL2rBJS9P8Ud1ZMy4412a"
            crossorigin="anonymous"></script>
</head>
<body data-page="moje-kody">
    <div class="app">
        <header class="animated-header">
            <div class="logo">
                <h1 data-i18n="myCodes">My codes</h1>
                <p class="subtitle" data-i18n="subtitleMyCodes">Your saved barcodes.</p>
            </div>
            <nav class="app-nav" aria-label="Primary" data-signed-in="false">
                <a href="./" data-i18n="backToGenerator">&larr; Generator</a>
                <a href="konto.html" data-i18n="title">Account</a>
            </nav>
        </header>

        <main id="main-content" class="container">
            <section class="card" aria-labelledby="codes-title">
                <h2 id="codes-title" data-i18n="savedCodesTitle">Saved codes</h2>
                <div id="status" role="status" aria-live="polite" data-i18n="loading">Loading…</div>
                <ul id="codes-list" class="codes-list" hidden></ul>
                <div id="empty" hidden>
                    <p><span data-i18n="empty">You haven't saved any codes yet.</span> <a href="./" data-i18n="emptyCta">Generate a barcode</a>.</p>
                </div>
                <div id="signed-out" hidden>
                    <p data-i18n="signInPrompt">Please sign in to view your saved codes.</p>
                    <p><a class="btn-primary" href="konto.html" data-i18n="signIn">Sign in</a></p>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Barcode Generator. <a href="polityka-prywatnosci.html">Privacy</a></p>
        </footer>
    </div>

    <template id="row-template">
        <li class="code-row">
            <div class="code-preview"><svg class="code-svg" aria-hidden="true"></svg></div>
            <div class="code-meta">
                <p class="code-type"></p>
                <p class="code-value"></p>
                <p class="code-date"></p>
            </div>
            <div class="code-actions">
                <button type="button" class="btn-action btn-delete" data-i18n="delete" data-i18n-aria-label="delete" aria-label="Delete">Delete</button>
            </div>
        </li>
    </template>

    <script type="module">
        import { getSupabase, getSession, onAuthStateChange } from '../supabase-client.js';

        const LANG = document.documentElement.lang || 'en';
        const I = window.BARCODE_I18N || {};
        const T = (I[LANG] && I[LANG].account) || (I.en && I.en.account) || {};

        document.querySelectorAll('[data-i18n]').forEach((el) => {
            const key = el.getAttribute('data-i18n');
            if (T[key]) el.textContent = T[key];
        });
        document.querySelectorAll('[data-i18n-aria-label]').forEach((el) => {
            const key = el.getAttribute('data-i18n-aria-label');
            if (T[key]) el.setAttribute('aria-label', T[key]);
        });
        if (T.myCodes) document.title = `${T.myCodes} — Barcode Generator`;

        const $ = (id) => document.getElementById(id);
        const list = $('codes-list');
        const status = $('status');
        const tmpl = $('row-template');

        const dateFmt = new Intl.DateTimeFormat(LANG, {
            year: 'numeric', month: 'short', day: 'numeric',
            hour: '2-digit', minute: '2-digit',
        });

        function safeText(node, sel, value) {
            const el = node.querySelector(sel);
            if (el) el.textContent = value ?? '';
        }

        function renderBarcode(svgEl, type, value) {
            try {
                if (typeof JsBarcode !== 'function') return;
                JsBarcode(svgEl, value, {
                    format: type, width: 1.6, height: 50, margin: 4,
                    displayValue: true, fontSize: 12,
                });
            } catch (_err) {
                const span = document.createElement('span');
                span.className = 'code-preview-fallback';
                span.textContent = T.previewUnavailable || 'Preview unavailable';
                svgEl.replaceWith(span);
            }
        }

        async function loadCodes(sb) {
            status.textContent = T.loading || 'Loading…';
            list.hidden = true;
            $('empty').hidden = true;

            const { data, error } = await sb
                .from('saved_codes')
                .select('id, code_type, value, name, settings, created_at')
                .order('created_at', { ascending: false });

            if (error) {
                status.textContent = (T.loadFail || 'Could not load your codes') + ': ' + (error.message || '');
                return;
            }
            if (!data || data.length === 0) {
                status.textContent = '';
                $('empty').hidden = false;
                return;
            }

            list.innerHTML = '';
            for (const row of data) {
                const node = tmpl.content.cloneNode(true);
                const li = node.querySelector('.code-row');
                li.dataset.id = row.id;

                safeText(node, '.code-type', row.code_type);
                safeText(node, '.code-value', row.name ? `${row.name} — ${row.value}` : row.value);
                if (row.created_at) {
                    safeText(node, '.code-date', dateFmt.format(new Date(row.created_at)));
                }

                const svgEl = node.querySelector('.code-svg');
                if (svgEl) renderBarcode(svgEl, row.code_type, row.value);

                node.querySelector('.btn-delete').addEventListener('click', async (e) => {
                    if (!confirm(T.deleteConfirm || 'Delete this code?')) return;
                    e.currentTarget.disabled = true;
                    const { error: delErr } = await sb
                        .from('saved_codes')
                        .delete()
                        .eq('id', row.id);
                    if (delErr) {
                        alert((T.deleteFail || 'Could not delete') + ': ' + (delErr.message || ''));
                        e.currentTarget.disabled = false;
                        return;
                    }
                    li.remove();
                    if (!list.querySelector('.code-row')) {
                        list.hidden = true;
                        $('empty').hidden = false;
                    }
                });

                list.appendChild(node);
            }
            list.hidden = false;
            status.textContent = '';
        }

        async function init() {
            const sb = await getSupabase();
            if (!sb) {
                status.textContent = T.notConfigured || 'Account features are not configured.';
                return;
            }

            const session = await getSession();
            if (!session?.user) {
                status.textContent = '';
                $('signed-out').hidden = false;
            } else {
                await loadCodes(sb);
            }

            await onAuthStateChange(async (_event, s) => {
                if (s?.user) {
                    $('signed-out').hidden = true;
                    await loadCodes(sb);
                } else {
                    list.hidden = true;
                    $('empty').hidden = true;
                    $('signed-out').hidden = false;
                    status.textContent = '';
                }
            });
        }

        init();
    </script>
    <script type="module" src="../nav-enhance.js?v=20260519120000"></script>
</body>
</html>
